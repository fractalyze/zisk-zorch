name: CI

permissions: read-all

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # The GPU leg is added here rather than skipped by a job-level `if`, which
  # cannot read `matrix`.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          cpu='{"backend":"cpu","runs_on":["self-hosted","cpu"],"frx_platforms":"cpu","tag_filters":"-gpu"}'
          gpu='{"backend":"gpu","runs_on":["self-hosted","gpu"],"frx_platforms":"cuda","tag_filters":""}'
          include="${cpu}"
          if [ "${{ vars.HAS_GPU_RUNNER }}" = "true" ]; then
            include="${cpu},${gpu}"
          fi
          echo "matrix={\"include\":[${include}]}" >> "$GITHUB_OUTPUT"

  build-and-test:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4

      # No setup-bazel: it clobbers the runner's persistent ~/.bazelrc.

      - name: bazel build
        run: bazel build -- //...

      - name: bazel test
        run: |
          bazel test \
            --test_env=FRX_PLATFORMS=${{ matrix.frx_platforms }} \
            --test_tag_filters=${{ matrix.tag_filters }} \
            -- //...

      - name: Upload bazel test logs
        if: ${{ failure() }}
        uses: fractalyze/.github/.github/actions/upload-bazel-testlogs@main
        with:
          name: bazel-test-logs-${{ matrix.backend }}
