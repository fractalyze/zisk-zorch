#
# Receives an `frx-update` repository_dispatch from the jax repo's
# notify-downstream workflow and opens a pin-bump PR. zisk-zorch must be listed
# in that dispatcher's consumer list for events to arrive.
#
# The frx/jax mix below is real, not a botched rename. The sender names the
# event and `frx_version` after the wheels it advertises, but that version is
# one build published under both names, so it is also the right number for the
# jax pins this repo still has. `upstream_repo` stays jax because pip-bump
# interpolates it into a github.com/fractalyze/<repo>/commit link and the
# publishing repo is still named jax. Only `packages:` names this repo's pins,
# and it moves when the pins move to frx.

name: FRX Update

on:
  repository_dispatch:
    types: [frx-update]

concurrency:
  group: frx-update
  cancel-in-progress: true

jobs:
  bump:
    runs-on: [self-hosted, cpu]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BUMPER_GH_PAT }}

      - name: Bump jax/jaxlib/jax-cuda12-plugin/zkx-cuda-pjrt
        uses: fractalyze/github-actions/pip-bump@main
        with:
          upstream_repo: jax
          version: ${{ github.event.client_payload.frx_version }}
          upstream_commit: ${{ github.event.client_payload.commit }}
          packages: jax jaxlib jax-cuda12-plugin zkx-cuda-pjrt
          github_token: ${{ secrets.BUMPER_GH_PAT }}
