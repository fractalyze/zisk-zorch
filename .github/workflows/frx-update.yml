#
# Receives an `frx-update` repository_dispatch from the jax repo's
# notify-downstream workflow and opens a pin-bump PR. zisk-zorch must be listed
# in that dispatcher's consumer list for events to arrive.
#
# The one remaining `jax` below is real, not a botched rename: `upstream_repo`
# stays jax because pip-bump interpolates it into a
# github.com/fractalyze/<repo>/commit link, and the publishing repo is still
# named jax (fractalyze/frx exists but is a PyPI-name placeholder, so pointing
# there links a commit that does not exist in it).
#
# Rule of thumb: `event_type` / `*_version` name the wheels; `*_repo` names the
# GitHub repo; `packages:` names this repo's pins — now frx, matching
# requirements.in.

name: FRX Update

on:
  repository_dispatch:
    types: [frx-update]

concurrency:
  group: frx-update
  cancel-in-progress: true

jobs:
  bump:
    runs-on: [self-hosted, cpu]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.BUMPER_GH_PAT }}

      - name: Bump frx/frxlib/frx-cuda12-plugin/frx-cuda12-pjrt
        uses: fractalyze/github-actions/pip-bump@main
        with:
          upstream_repo: jax
          version: ${{ github.event.client_payload.frx_version }}
          upstream_commit: ${{ github.event.client_payload.commit }}
          packages: frx frxlib frx-cuda12-plugin frx-cuda12-pjrt
          github_token: ${{ secrets.BUMPER_GH_PAT }}
